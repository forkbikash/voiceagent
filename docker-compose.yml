services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  agent-worker:
    build: .
    command: python agent_worker.py start
    env_file:
      - .env
    restart: unless-stopped
